<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMDb Search</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:sans-serif;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:20px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
font-size:16px;
}

.card{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:15px;
}

.poster{
width:100%;
border-radius:10px;
}

.cast{
display:flex;
overflow:auto;
gap:10px;
margin-top:10px;
}

.cast img{
width:70px;
border-radius:10px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Search TMDb</h2>

<input id="id" placeholder="Enter TMDb ID">
<button onclick="search()">Search</button>

<div id="result"></div>

</div>

<script>

const API="fed86956458f19fb45cdd382b6e6de83";
const BIN_URL="https://api.jsonbin.io/v3/b/69ba5210c3097a1dd5363c92";
const BIN_KEY="$2a$10$tByBigh5JySCavkqFsCAruTYuldDxnOUWjVQb/gLyeKOU1XKYfG6i";

async function search(){

let id=document.getElementById("id").value;

let type="movie";

let res=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API}`);

if(res.status!=200){
type="tv";
res=await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API}`);
}

let data=await res.json();

// JSON DB fetch
let db=await fetch(BIN_URL,{
headers:{"X-Master-Key":BIN_KEY}
});

let json=await db.json();

let watchLink=json[id]?.watch || "#";

// UI build
let html=`

<div class="card">

<img class="poster" src="https://image.tmdb.org/t/p/w500${data.poster_path}">

<h2>${data.title||data.name}</h2>

<p>⭐ ${data.vote_average}</p>
<p>Release: ${data.release_date||data.first_air_date}</p>
<p>Language: ${data.original_language}</p>

<p>${data.overview}</p>

<button onclick="watch('${watchLink}')">Watch Now</button>

`;

if(type=="tv"){

html+=`
<select id="season">
<option value="1">Season 1</option>
<option value="2">Season 2</option>
</select>

<button onclick="watchSeries('${id}')">Watch Series</button>
`;

}

html+=`<h3>Cast</h3><div id="cast" class="cast"></div></div>`;

document.getElementById("result").innerHTML=html;

// CAST
let cast=await fetch(`https://api.themoviedb.org/3/${type}/${id}/credits?api_key=${API}`);
let castData=await cast.json();

let castHTML="";

castData.cast.slice(0,10).forEach(c=>{
if(c.profile_path){
castHTML+=`<div><img src="https://image.tmdb.org/t/p/w200${c.profile_path}"><p>${c.name}</p></div>`;
}
});

document.getElementById("cast").innerHTML=castHTML;

}

// watch movie
function watch(link){

// SAFE AD trigger (1 click)
window.open("https://your-ad-link.com","_blank");

// open movie
setTimeout(()=>{
window.open(link,"_blank");
},1000);

}

// series watch
function watchSeries(id){

let season=document.getElementById("season").value;

let link=`https://yourwatchlink.com/series/${id}/season/${season}`;

window.open(link,"_blank");

}

</script>

</body>
</html>
